# Imagem padrão para todos os jobs que não declararem a própria.
# Jobs que precisam do Docker sobrescrevem isso.
image: python:3.12-slim

# Declara a ordem de execução dos stages.
# Se um stage falhar, os seguintes não executam.
stages:
  - lint
  - test
  - sast
  - build
  - smoke-test
  - deploy

# Redireciona o cache do pip para dentro do diretório do projeto.
# O GitLab só consegue fazer cache de caminhos dentro de $CI_PROJECT_DIR,
# por isso não é possível usar o cache padrão do pip em /root/.cache.
variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

# Cache compartilhado entre jobs e pipelines.
# Na prática: o pip não baixa os pacotes do zero a cada pipeline,
# ele reutiliza o que já está em .cache/pip.
# key: branch garante que branches diferentes não compartilhem cache incompatível.
# CI_COMMIT_REF_SLUG: nome da branch injetado de forma "sanitizada". Converte para
# lowercase, encurta em 63 bytes e substitui tudo que não for a-z ou 0-9 por "-".
cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip
# Obs: jobs que usam .docker-base herdam este bloco mas não executam pip,
# então o cache não tem efeito prático neles. É inofensivo.

# -----------------------------------------------------------------------------
# STAGE: lint
# Verifica qualidade e estilo do código Python com flake8.
# O job falha automaticamente se o flake8 encontrar qualquer problema,
# impedindo que código com erros avance no pipeline.
# -----------------------------------------------------------------------------
lint:
  stage: lint
  script:
    - pip install flake8
    - flake8 app.py test_app.py

# -----------------------------------------------------------------------------
# STAGE: test
# Roda os testes unitários com pytest.
# O job falha se qualquer teste falhar.
# -----------------------------------------------------------------------------
test:
  stage: test
  script:
    - pip install flask==3.0.0 pytest==7.4.3
    - pytest test_app.py -v

# -----------------------------------------------------------------------------
# STAGE: sast (Static Application Security Testing)
# Analisa o código Python em busca de vulnerabilidades de segurança
# conhecidas sem executar a aplicação.
# Usa o Bandit, ferramenta padrão de SAST para Python, que detecta problemas
# como injeção de comandos, uso de funções inseguras e más práticas
# criptográficas.
# -ll: reporta apenas severidade MEDIUM ou HIGH, ignorando ruído de LOW
# -----------------------------------------------------------------------------
sast:
  stage: sast
  script:
    - pip install bandit
    - bandit app.py test_app.py -ll

# ------------------------- docker-base: JOB TEMPLATE -------------------------
# Define as características da imagem do docker.
#
# O ponto no início do nome diz ao GitLab para não executar ele diretamente, 
# só usar como base. Dentro dos stages, o extends herda tudo (image, services, 
# variables, before_script) e o job filho só declara o que é específico dele.
#
# Usa Docker-in-Docker (dind): como o runner já roda dentro de um container,
# precisamos de um serviço auxiliar para executar comandos Docker dentro dele.
# -----------------------------------------------------------------------------
.docker-base:
  image: docker:24
  services:
    - docker:24-dind
  variables:
    # Endereço do daemon Docker exposto pelo serviço dind
    DOCKER_HOST: tcp://docker:2376 
    DOCKER_TLS_CERTDIR: "/certs"
  # O before_script é herdado por todos os jobs filhos e roda antes do script
  # de cada um, garantindo que o login no registry ocorra automaticamente.
  before_script:
    # Login no registry usando as credenciais injetadas pelo GitLab.
    # Nunca escrever senha aqui, pois o GitLab já gera um token 
    # temporário válido só para esse pipeline.
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

# -----------------------------------------------------------------------------
# STAGE: build
# Constrói a imagem Docker e faz push para o GitLab Container Registry.
#
# As variáveis CI_REGISTRY_* são injetadas automaticamente pelo GitLab.
# NUNCA fazer hardcoding das credenciais no pipeline!
# ┌─────────────────────────────────────────────────────────────┐
# │ CI_REGISTRY          = registry.gitlab.com                  │
# │ CI_REGISTRY_IMAGE    = registry.gitlab.com/user/projeto     │
# │ CI_REGISTRY_USER     = usuário GitLab                       │
# │ CI_REGISTRY_PASSWORD = token temporário gerado pelo GitLab  │
# │ CI_COMMIT_SHORT_SHA  = hash do commit atual                 │
# └─────────────────────────────────────────────────────────────┘
# -----------------------------------------------------------------------------
build:
  extends: .docker-base
  stage: build
  script:
    # 1. Build da imagem. A flag -t define o nome completo com tag.
    #    Usa o hash curto do commit como tag para rastreabilidade.
    #    Resultado: registry.gitlab.com/user/projeto:a1b2c3d4
    #    O ponto no final significa "use o Dockerfile desta pasta".
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA .
    # 2. Envia a imagem taggeada com o hash para o registry.
    #    Agora ela fica armazenada lá e pode ser puxada por qualquer
    #    serviço que tenha acesso, inclusive o ECS no deploy.
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    # 3. Cria uma segunda tag apontando para a mesma imagem.
    #    'latest' aponta sempre para o build mais recente da main.
    #    registry.gitlab.com/user/projeto:latest agora aponta
    #    para o mesmo conteúdo que :a1b2c3d4
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA $CI_REGISTRY_IMAGE:latest
    # 4. Envia a tag latest também.
    - docker push $CI_REGISTRY_IMAGE:latest

# -----------------------------------------------------------------------------
# STAGE: smoke test
# 
# Sobe o container da imagem que acabou de buildar, espera ele inicializar,
# chama o script de health check contra ele e, por fim, derruba o container.
# 
# Valida que a imagem buildada funciona de fato, não se restringindo ao código
# compilado. Testa o artefato real.
# -----------------------------------------------------------------------------
smoke-test:
  extends: .docker-base
  stage: smoke-test  # stage próprio, depois do build
  script:
    - apk add --no-cache curl   # docker:24 é Alpine e curl não vem instalado
    - docker pull $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker run -d --name smoke-test -p 5000:5000 $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - sleep 5   # heurística: tempo suficiente para o gunicorn inicializar no dind
    - sh healthcheck.sh http://docker:5000/health
    - docker stop smoke-test

# -----------------------------------------------------------------------------
# STAGE: deploy
# Faz push da imagem validada para o Amazon ECR e aciona o redeploy no ECS.
#
# Fluxo intencional: a imagem só chega ao ECR após passar pelo smoke-test,
# garantindo que o registry de produção nunca receba imagens quebradas.
#
# Usa a imagem amazon/aws-cli como base por precisar do AWS CLI para
# autenticar no ECR e acionar o ECS. O Docker client é instalado via yum
# pois a imagem base não o inclui.
#
# TLS desativado no dind (porta 2375, DOCKER_TLS_CERTDIR vazio): necessário
# por incompatibilidade entre a imagem amazon/aws-cli e o handshake TLS do
# dind. Trade-off aceitável pois a comunicação é interna ao job.
#
# Variáveis necessárias — GitLab → Settings → CI/CD → Variables:
# ┌───────────────────────┬─────────────────────────────────────────────┐
# │ AWS_ACCESS_KEY_ID     │ Chave de acesso do IAM user do pipeline     │
# │ AWS_SECRET_ACCESS_KEY │ Chave secreta do IAM user do pipeline       │
# │ AWS_DEFAULT_REGION    │ Região onde o ECR e ECS foram provisionados │
# │ ECR_REPOSITORY_URL    │ URL completa do repositório ECR (sem tag)   │
# └───────────────────────┴─────────────────────────────────────────────┘
#
# O job só roda na branch main. Alterações em outras branches passam por
# todos os stages anteriores mas não disparam deploy.
# -----------------------------------------------------------------------------
deploy:
  stage: deploy
  image:
    name: amazon/aws-cli:latest
    entrypoint: [""]  # Desativa o entrypoint padrão "aws" para permitir
                      # execução de comandos arbitrários no script
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: tcp://docker:2375    # Porta sem TLS
    DOCKER_TLS_CERTDIR: ""            # Desativa geração de certs no dind
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    # Instala o Docker client na imagem amazon/aws-cli (baseada em Amazon Linux)
    - yum install -y docker
    # Autentica no GitLab Registry para puxar a imagem já validada pelo smoke-test
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    # Autentica no ECR via token temporário gerado pelo AWS CLI.
    # Diferente do GitLab Registry, o ECR não usa usuário/senha fixos:
    # o token é gerado via IAM e tem validade de 12 horas.
    - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REPOSITORY_URL
    # Puxa do GitLab Registry a imagem já validada pelo smoke-test
    - docker pull $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    # Cria as tags para o ECR e faz push das duas:
    # - hash do commit: rastreabilidade (qual código está em produção)
    # - latest: conveniente para puxar sempre a versão mais recente
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA $ECR_REPOSITORY_URL:$CI_COMMIT_SHORT_SHA
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA $ECR_REPOSITORY_URL:latest
    - docker push $ECR_REPOSITORY_URL:$CI_COMMIT_SHORT_SHA
    - docker push $ECR_REPOSITORY_URL:latest
    # Força o ECS a puxar a nova imagem do ECR e reiniciar o serviço.
    # O ECS substitui gradualmente as tasks em execução pela nova versão.
    - aws ecs update-service --cluster devnology-api-cluster --service devnology-api-service --force-new-deployment
  environment:
    name: production
